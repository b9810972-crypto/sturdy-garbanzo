version: 2.1

jobs:
  debug-macos:
    macos:
      xcode: "15.0.0"   # or whatever version you need

    steps:
      - checkout

      # Install tmate
      - run:
          name: Install tmate
          command: |
            brew update
            brew install tmate

      # Start tmate session
      - run:
          name: Start tmate session
          command: |
            echo "Starting tmate..."

            # Start tmate in background
            tmate -S /tmp/tmate.sock new-session -d

            # Wait until ready
            tmate -S /tmp/tmate.sock wait tmate-ready

            # Print SSH connection string
            echo "=============================="
            echo "TMATE SSH:"
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
            echo "=============================="

            # Print web session (optional)
            echo "TMATE WEB:"
            tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
            echo "=============================="

            # Keep job alive (30 mins)
            sleep 1800

workflows:
  debug:
    jobs:
      - debug-macos
