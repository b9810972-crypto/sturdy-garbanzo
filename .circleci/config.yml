- run:
    name: Robust tmate setup
    command: |
      set -eo pipefail

      brew install tmate || true

      SOCK=/tmp/tmate.sock
      export TMATE_FORCE_IPV4=1

      echo "Checking network..."
      ping -c 2 8.8.8.8 || true

      for i in {1..5}; do
        echo "Starting tmate attempt $i..."
        tmate -S $SOCK new-session -d && break
        sleep 5
      done

      tmate -S $SOCK wait tmate-ready

      echo "=============================="
      tmate -S $SOCK display -p '#{tmate_ssh}'
      echo "=============================="

      while true; do
        echo "Alive: $(date)"
        sleep 6000000
      done
